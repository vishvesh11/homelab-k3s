---
- name: Deploy K3s Master (Control Plane)
  hosts: master
  become: yes
  tasks:
    - name: Install K3s server on OCI
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | sh -s - server \
          --bind-address=100.64.0.2 \
          --advertise-address=100.64.0.2 \
          --node-ip=100.64.0.2 \
          --flannel-iface=tailscale0 \
          --tls-san=100.64.0.2
      args:
        creates: /etc/rancher/k3s/k3s.yaml

    - name: Wait for K3s node-token to be generated
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/server/node-token

    - name: Retrieve K3s node token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token_b64

    - name: Set fact for node token
      ansible.builtin.set_fact:
        k3s_token: "{{ node_token_b64['content'] | b64decode | trim }}"

- name: Deploy K3s Worker (Ryzen Node)
  hosts: worker
  become: yes
  tasks:
    - name: Wait for Master API server to be reachable
      ansible.builtin.wait_for:
        host: 100.64.0.2
        port: 6443
        timeout: 120

    - name: Install K3s agent on Ryzen VM
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | K3S_URL=https://100.64.0.2:6443 K3S_TOKEN="{{ hostvars[groups['master'][0]]['k3s_token'] }}" sh -s - \
          --node-ip=192.168.5.30
      args:
        creates: /etc/systemd/system/k3s-agent.service.env
