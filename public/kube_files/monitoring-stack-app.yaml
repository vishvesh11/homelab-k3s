apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 58.2.2 # You can update this to the latest stable version
    helm:
      values: |
        
        prometheus:
          prometheusSpec:
            nodeSelector:
              location: cloud-watchtower
            # Keep metrics for 15 days
            retention: "15d"
            additionalScrapeConfigs:
              - job_name: 'proxmox-nodes'
                static_configs:
                  - targets: 
                    - '<PROXMOX_NODE_1_IP>:9100' # Replace with Proxmox Node 1 Headscale IP
                    - '<PROXMOX_NODE_2_IP>:9100' # Replace with Proxmox Node 2 Headscale IP
              - job_name: 'pfsense-router'
                static_configs:
                  - targets: 
                    - '<PFSENSE_ROUTER_IP>:9273' # Replace with PFSENSE Router Headscale IP
              - job_name: 'coolify-containers'
                static_configs:
                  - targets: 
                    - '<COOLIFY_DASHBOARD_BRIDGE_IP>:8000' # Replace with Coolify Dashboard Bridge Headscale IP

        # Pin Grafana to the OCI node
        grafana:
          nodeSelector:
            location: cloud-watchtower
          # Use your existing ingress/cert-manager setup
          ingress:
            enabled: true
            ingressClassName: "traefik" # or traefik, depending on your setup
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
              external-dns.alpha.kubernetes.io/target: "<YOUR_IP>"
              external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
              traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
            hosts:
              - grafana.<YOUR_DOMAIN> # Update with your actual domain
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.<YOUR_DOMAIN> # Update with your actual domain
          additionalDataSources:
              - name: Loki
                type: loki
                uid: loki
                url: https://loki.<YOUR_DOMAIN> # Update with your actual domain
                access: proxy
                isDefault: false
                jsonData:
                  maxLines: 1000
                  timeout: 60
                  derivedFields: []
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        # Pin Alertmanager to the OCI node
        alertmanager:
          alertmanagerSpec:
            nodeSelector:
              location: cloud-watchtower
          config:
            global:
              resolve_timeout: 5m
              # Global SMTP Configuration
              smtp_smarthost: 'smtp.gmail.com:587'
              smtp_from: '<YOUR_EMAIL>@gmail.com' # <-- UPDATE THIS
              smtp_auth_username: '<YOUR_EMAIL>@gmail.com' # <-- UPDATE THIS
              smtp_auth_password: '<YOUR_APP_PASSWORD>' # <-- UPDATE THIS with an App Password from Gmail
              smtp_require_tls: true
            
            # The Routing Tree
            route:
              group_by: ['alertname', 'job', 'severity']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 3h
              # Default receiver for all alerts
              receiver: 'discord_and_email'
              
              # You can add specific routes here later (e.g., critical to SMS)
              routes:
                - matchers:
                    - severity="critical"
                  receiver: 'discord_and_email'

            # The Receivers (Where the alerts actually go)
            receivers:
              - name: 'discord_and_email'
                # 1. Discord Webhook
                discord_configs:
                  - webhook_url: '<DISCORD_WEBHOOK_URL>'
                    send_resolved: true
                    title: '{{ template "discord.default.title" . }}'
                    message: '{{ template "discord.default.message" . }}'
                
                # 2. Gmail SMTP
                email_configs:
                  - to: '<YOUR_EMAIL>@gmail.com' # add your email here to receive alerts
                    from: 'serverstatus.<YOUR_EMAIL>@gmail.com'
                    send_resolved: true
                  - to: '<ANOTHER_EMAIL>@gmail.com' # add another email here to receive alerts
                    from: 'serverstatus.<YOUR_EMAIL>@gmail.com'
                    send_resolved: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
