---
# 1. The Headless Service
apiVersion: v1
kind: Service
metadata:
  name: coolify-dashboard-bridge
  namespace: default
spec:
  ports:
    - port: 3000
      targetPort: 3000
---
# 2. The Manual Endpoint (Pointing to Port 3000)
apiVersion: v1
kind: Endpoints
metadata:
  name: coolify-dashboard-bridge
  namespace: default
subsets:
  - addresses:
      - ip: YOUR_COOLIFY_IP
    ports:
      - port: 3000
---
# 3. The Internal Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coolify-dashboard-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
    external-dns.alpha.kubernetes.io/target: "YOUR_OCI_IP" # Your OCI Node Tailscale IP
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - your-coolify-domain.com
      secretName: coolify-dashboard-tls
  rules:
    - host: your-coolify-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coolify-dashboard-bridge
                port:
                  number: 3000 # Updated to match Coolify
