apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tangent-data-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/vishvesh11/website-data.git"
    path: tangentdata-chart # Matches the path updated by your GitHub Action
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: "https://kubernetes.default.svc"
    namespace: website-data # The namespace where your ghrc-sectet lives
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
