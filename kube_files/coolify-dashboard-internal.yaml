---
# 1. The Headless Service
apiVersion: v1
kind: Service
metadata:
  name: coolify-dashboard-bridge
  namespace: default
spec:
  ports:
    - port: 3000
      targetPort: 3000
---
# 2. The Manual Endpoint (Pointing to Port 3000)
apiVersion: v1
kind: Endpoints
metadata:
  name: coolify-dashboard-bridge
  namespace: default
subsets:
  - addresses:
      - ip: 100.64.0.5 # Your Coolify LXC Tailscale IP
    ports:
      - port: 3000
---
# 3. The Internal Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coolify-dashboard-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
    external-dns.alpha.kubernetes.io/target: "100.64.0.2" # Your OCI Node Tailscale IP
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - coolify.vishvesh.me
      secretName: coolify-dashboard-tls
  rules:
    - host: coolify.vishvesh.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coolify-dashboard-bridge
                port:
                  number: 3000 # Updated to match Coolify
