---
# 1. The Headless Service (No selector)
apiVersion: v1
kind: Service
metadata:
  name: coolify-external-bridge
  namespace: default
spec:
  ports:
    - port: 80
      targetPort: 80
---
# 2. The Manual Endpoint (Replaces ExternalName)
apiVersion: v1
kind: Endpoints
metadata:
  name: coolify-external-bridge
  namespace: default
subsets:
  - addresses:
      - ip: 100.64.0.5 # Your Coolify LXC Tailscale IP
    ports:
      - port: 80
---
# 2. The Wildcard Router & SSL Provisioner
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coolify-wildcard-ingress
  namespace: default
  annotations:
    # Tell Cert-Manager to get a cert using your Cloudflare setup
    cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
    # Tell External-DNS to create wildcard records in Cloudflare
    external-dns.alpha.kubernetes.io/target: "80.225.195.89"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  ingressClassName: traefik
  tls:
    # This requests ONE single certificate that covers all subdomains for these 3 roots
    - hosts:
        - "*.devcoolify.vishvesh.me"
        - "*.devcoolify.tangentdata.in"
        - "*.devcoolify.vishvesh.us.kg"
      secretName: coolify-wildcard-tls-secret
  rules:
    # Route 1
    - host: "*.devcoolify.vishvesh.me"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coolify-external-bridge
                port:
                  number: 80
    # Route 2
    - host: "*.devcoolify.tangentdata.in"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coolify-external-bridge
                port:
                  number: 80
    # Route 3
    - host: "*.devcoolify.vishvesh.us.kg"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coolify-external-bridge
                port:
                  number: 80
